# Pre-training configuration for inverse dynamics PINN
# Usage: python scripts/pretrain_dynamics_pinn.py --config experiments/configs/pretrain_dynamics.yaml

# ── Data ──────────────────────────────────────────────────────────
datasets:
  - addbiomechanics
  # - biocv        # uncomment after downloading
  # - opencap      # uncomment after downloading

# Only use jump-relevant movements for transfer to high jump
movement_filter:
  - cmj
  - drop_jump
  - squat_jump
  - vertical_jump
  - running
  - sprinting

window_size: 64       # frames per training window
stride: 32            # overlap between windows
max_subjects: null    # null = use all, set to 5 for quick testing

# ── Model ─────────────────────────────────────────────────────────
model_type: inverse_dynamics   # or "projectile" for flight-phase only
hidden_dim: 128
n_layers: 5

# ── Training ──────────────────────────────────────────────────────
epochs: 3000
batch_size: 128
learning_rate: 0.001
lambda_data: 1.0
lambda_physics: 1.0
weight_decay: 0.00001

# ── Output ────────────────────────────────────────────────────────
save_every: 500
log_interval: 50
